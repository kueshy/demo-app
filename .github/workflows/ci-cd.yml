name: CI/CD Pipeline

# Trigger on pushes to main (application code + Dockerfile repo, per the diagram)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: demo-app                 # the orange "container registry" box
  EKS_CLUSTER_NAME: production-cluster
  HELM_REPO: your-org/helm-charts          # the separate "Helm Charts" GitHub repo

permissions:
  id-token: write   # required for OIDC auth to AWS (no long-lived keys)
  contents: read
  security-events: write   # required to upload CodeQL / Trivy SARIF results

jobs:
  # ---------------------------------------------------------------------
  # STAGE 1: Test  +  STAGE 2: Build  (the ✔ and ⚙ icons in the pipeline)
  # ---------------------------------------------------------------------
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout application code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn -B test

      - name: Publish test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Build application jar
        run: mvn -B clean package -DskipTests

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  # ---------------------------------------------------------------------
  # STAGE 3: Code Scanning (SAST on the source code, before it's even
  # packaged into an image)
  # ---------------------------------------------------------------------
  code-scanning:
    name: Code Scanning
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'

      - name: Build for CodeQL analysis
        run: mvn -B clean compile -DskipTests

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3

  # ---------------------------------------------------------------------
  # STAGE 4: Image Build + STAGE 5: Image Scanning + Push Docker Image
  # (the orange cube in the diagram = Amazon ECR)
  # ---------------------------------------------------------------------
  image-build-scan-push:
    name: Build, Scan & Push Image
    runs-on: ubuntu-latest
    needs: [test-and-build, code-scanning]
    if: github.ref == 'refs/heads/main'   # only push images from main, not PRs
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-ecr-push
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        # -f explicitly points at the Dockerfile checked out above (repo root).
        # The trailing "." is the build context: the whole checked-out repo,
        # so COPY src/ and COPY pom.xml inside the Dockerfile can find their files.
        run: |
          docker build \
            -f Dockerfile \
            -t $ECR_REPOSITORY:${{ steps.vars.outputs.image_tag }} \
            -t $ECR_REPOSITORY:latest \
            .

      # Image Scanning: fail the pipeline on HIGH/CRITICAL CVEs before
      # anything is pushed to the registry
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: '${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.image_tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'   # non-zero -> pipeline stops here if vulns found

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Tag & push image to ECR
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker tag $ECR_REPOSITORY:${{ steps.vars.outputs.image_tag }} \
            $REGISTRY/$ECR_REPOSITORY:${{ steps.vars.outputs.image_tag }}
          docker tag $ECR_REPOSITORY:latest \
            $REGISTRY/$ECR_REPOSITORY:latest
          docker push $REGISTRY/$ECR_REPOSITORY:${{ steps.vars.outputs.image_tag }}
          docker push $REGISTRY/$ECR_REPOSITORY:latest

  # ---------------------------------------------------------------------
  # STAGE 6: "Update Image ID" -> commit the new tag into the Helm
  # Charts repo. This commit is what ArgoCD detects (it polls/webhooks
  # on that repo), which is the "Trigger Deploy" arrow into Argo.
  # ---------------------------------------------------------------------
  update-helm-chart:
    name: Update Helm Chart (triggers ArgoCD)
    runs-on: ubuntu-latest
    needs: image-build-scan-push
    steps:
      - name: Checkout Helm charts repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPO }}
          token: ${{ secrets.HELM_REPO_PAT }}   # PAT/deploy key with push access
          path: helm-charts

      - name: Bump image tag in values.yaml
        run: |
          cd helm-charts/demo-app
          yq -i '.image.tag = "${{ needs.image-build-scan-push.outputs.image_tag }}"' values.yaml

      - name: Commit and push
        run: |
          cd helm-charts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demo-app/values.yaml
          git commit -m "chore: bump demo-app image to ${{ needs.image-build-scan-push.outputs.image_tag }}"
          git push
