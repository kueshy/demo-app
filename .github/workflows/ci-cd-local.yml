name: CI/CD Pipeline (Local/No-AWS)

# Identical triggers to ci-cd.yml
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: demo-app
  HELM_REPO: your-org/helm-charts

permissions:
  id-token: write
  contents: read
  security-events: write
  packages: write   # <- new: needed to push to ghcr.io (ECR needed no GitHub-side permission for this)

jobs:
  # -----------------------------------------------------------------
  # UNCHANGED from ci-cd.yml — these jobs never talked to AWS anyway
  # -----------------------------------------------------------------
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven
      - run: mvn -B test
      - run: mvn -B clean package -DskipTests

  code-scanning:
    name: Code Scanning
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: java
      - uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
      - run: mvn -B clean compile -DskipTests
      - uses: github/codeql-action/analyze@v3

  # -----------------------------------------------------------------
  # THIS is the job that changes. Compare step-by-step against
  # image-build-scan-push in ci-cd.yml:
  #   - "Configure AWS credentials (OIDC)"  -> deleted entirely
  #   - "Login to Amazon ECR"               -> replaced with docker/login-action
  #     using the ghcr.io registry and the automatic GITHUB_TOKEN
  #     (no secrets to create — GitHub provides this token to every run)
  #   - image names change from $ECR_REPOSITORY to ghcr.io/<owner>/...
  #   - Trivy scan step is untouched — it doesn't care which registry
  #     an image will end up in, only what's already built locally
  # -----------------------------------------------------------------
  image-build-scan-push:
    name: Build, Scan & Push Image (ghcr.io)
    runs-on: ubuntu-latest
    needs: [test-and-build, code-scanning]
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided, no setup needed

      - name: Build Docker image
        run: |
          docker build \
            -f Dockerfile \
            -t ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:${{ steps.vars.outputs.image_tag }} \
            -t ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:latest \
            .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:${{ steps.vars.outputs.image_tag }}
          docker push ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME:latest

  # -----------------------------------------------------------------
  # UNCHANGED from ci-cd.yml — still just bumps image.tag in the Helm
  # repo. It doesn't know or care whether that tag lives in ECR or
  # GHCR — image.repository (which registry) lives in values.yaml /
  # values-local.yaml, not here.
  # -----------------------------------------------------------------
  update-helm-chart:
    name: Update Helm Chart (triggers ArgoCD)
    runs-on: ubuntu-latest
    needs: image-build-scan-push
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPO }}
          token: ${{ secrets.HELM_REPO_PAT }}
          path: helm-charts
      - run: |
          cd helm-charts/demo-app
          yq -i '.image.tag = "${{ needs.image-build-scan-push.outputs.image_tag }}"' values.yaml
      - run: |
          cd helm-charts
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demo-app/values.yaml
          git commit -m "chore: bump demo-app image to ${{ needs.image-build-scan-push.outputs.image_tag }}"
          git push
